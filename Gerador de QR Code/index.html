<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de QR Code | VCard Profissional</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-4">

    <main class="bg-slate-800 p-8 rounded-3xl shadow-2xl w-full max-w-4xl flex flex-col md:flex-row gap-10 border border-slate-700">
        
        <section class="flex-1 space-y-6">
            <div>
                <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
                    VCard QR Gen
                </h1>
                <p class="text-slate-400 mt-2">Transforme seu contato em um QR Code profissional.</p>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">Nome Completo</label>
                    <input type="text" id="nome" placeholder="Ex: André Carvalho" 
                        class="w-full bg-slate-700 border border-slate-600 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">Telefone / WhatsApp</label>
                    <input type="text" id="telefone" placeholder="Ex: 81 99999-9999" 
                        class="w-full bg-slate-700 border border-slate-600 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                </div>

                <button class="w-full bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white font-bold py-3 rounded-xl shadow-lg transform transition active:scale-95 mt-4">
                    Gerar meu QR Code
                </button>
            </div>
        </section>

        <section class="flex-1 border-t md:border-t-0 md:border-l border-slate-700/50 pt-8 md:pt-0 md:pl-10 flex items-center justify-center">
            <div id="qrcode-container" class="text-center">
                <p class="text-slate-500 italic">O seu QR Code aparecerá aqui.</p>
            </div>
        </section>

    </main>

</body>
</html>
